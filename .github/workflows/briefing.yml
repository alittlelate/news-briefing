name: Daily News Briefing

on:
  schedule:
    - cron: '0 5 * * *'  # 5am UTC = 6am CET / 7am CEST
  workflow_dispatch:       # manual trigger from GitHub UI

jobs:
  briefing:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit reports back to repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Run briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: go run cmd/briefing/main.go

      - name: Commit report
        run: |
          git config user.name "briefing-bot"
          git config user.email "bot@briefing"
          git add reports/
          git diff --staged --quiet || git commit -m "briefing: $(date +%Y-%m-%d)"
          git push
